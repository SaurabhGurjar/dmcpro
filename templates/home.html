{% extends "base.html" %}

{% block title %}
Dashboard
{% endblock %}

{% block content %}

<h2>Welcome {{ user.first_name|default:user.username }}</h2>

<p>
You have successfully logged in.
</p>

<form method="post" action="{% url 'logout' %}">
    {% csrf_token %}
    <button class="btn btn-danger">
        Logout
    </button>
</form>

{% endblock %}
