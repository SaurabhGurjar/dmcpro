<div class="card shadow-sm mb-4 border-0">

    <div class="card-body">

        <div class="d-flex justify-content-between align-items-center">

            <div>

                <h3 class="mb-1">
                    {{ project.title }}
                </h3>

                <div class="text-muted">
                    {{ project.project_code }}
                </div>

            </div>

            <div>

                <span class="badge bg-success">
                    {{ project.get_status_display }}
                </span>

            </div>

        </div>

        <hr>

        <ul class="nav nav-pills">

            <li class="nav-item">
                <a class="nav-link {% if active_tab == 'overview' %}active{% endif %}"
                   href="{% url 'projects:project-detail' project.pk %}">
                    Overview
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link {% if active_tab == 'charter' %}active{% endif %}"
                    href="{% url 'projects:charter-detail' project.pk %}">
                    Charter
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link {% if active_tab == 'team' %}active{% endif %}"
                   href="{% url 'projects:team-list' project.pk %}">
                    Team
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link {% if active_tab == 'define' %}active{% endif %}"
                   href="#">
                    Define
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link disabled">
                    Measure
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link disabled">
                    Analyze
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link disabled">
                    Improve
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link disabled">
                    Control
                </a>
            </li>

        </ul>

    </div>

</div>
